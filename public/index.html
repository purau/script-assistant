<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PuraU Script Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F7F5F0;--surface:#FFFFFF;--border:#E4E0D8;--text:#1A1916;--muted:#7A7670;--accent:#2D6A4F;--accent-light:#E8F2EE;--user-bg:#2D6A4F;--radius:16px;--radius-sm:10px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.container{width:100%;max-width:660px}
.brand{text-align:center;margin-bottom:20px}
.brand h1{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;color:var(--text)}
.brand p{font-size:12px;color:var(--muted);margin-top:4px}
.products{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.prod-btn{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all 0.15s}
.prod-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.prod-btn:hover:not(.active){border-color:var(--accent);color:var(--accent)}
.inspiration-bar{margin-bottom:12px;display:flex;gap:8px;align-items:center}
.inspiration-bar input{flex:1;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;outline:none;transition:border-color 0.15s}
.inspiration-bar input:focus{border-color:var(--accent)}
.inspiration-bar input::placeholder{color:var(--muted)}
.inspiration-bar button{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--accent);background:var(--accent-light);color:var(--accent);cursor:pointer;white-space:nowrap;transition:all 0.15s}
.inspiration-bar button:hover{background:var(--accent);color:#fff}
.chat-window{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;height:520px}
#messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.msg{max-width:84%;padding:10px 14px;border-radius:var(--radius);font-size:14px;line-height:1.65;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:var(--user-bg);color:#fff;border-bottom-right-radius:4px}
.msg.assistant{align-self:flex-start;background:var(--bg);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px}
.typing-dots span{display:inline-block;width:5px;height:5px;background:var(--muted);border-radius:50%;margin:0 2px;animation:bounce 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.chips-area{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:7px;flex-wrap:wrap;background:var(--bg)}
.chip{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.chip:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.input-row{display:flex;align-items:flex-end;gap:10px;padding:12px 14px;border-top:1px solid var(--border);background:var(--surface)}
textarea{flex:1;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;resize:none;height:40px;max-height:120px;line-height:1.5;outline:none;transition:border-color 0.15s}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--muted)}
#sendbtn{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:9px 18px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;cursor:pointer;height:40px;transition:opacity 0.15s;white-space:nowrap}
#sendbtn:hover{opacity:0.88}
#sendbtn:disabled{opacity:0.4;cursor:not-allowed}
.footer-row{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding:0 2px}
.footer-note{font-size:11px;color:var(--muted)}
.clear-btn{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:20px;padding:4px 10px;cursor:pointer;transition:all 0.15s}
.clear-btn:hover{border-color:#c0392b;color:#c0392b}
</style>
</head>
<body>
<div class="container">
  <div class="brand">
    <h1>PuraU Script Assistant</h1>
    <p>Select your product, then describe what you're making</p>
  </div>
  <div class="products">
    <button class="prod-btn active" onclick="setProduct('acne',this)">Acne Program</button>
    <button class="prod-btn" onclick="setProduct('gutfibre',this)">Gut Fibre</button>
    <button class="prod-btn" onclick="setProduct('gutglow',this)">GutGlow Collagen</button>
  </div>
  <div class="inspiration-bar">
    <input type="text" id="inspirationInput" placeholder="Paste a winning ad, hook or concept you love and I'll rework it for PuraU..."/>
    <button onclick="useInspiration()">Use as inspiration</button>
  </div>
  <div class="chat-window">
    <div id="messages"></div>
    <div class="chips-area">
      <div class="chip" onclick="quickstart('I want to create a script but not sure where to start. Ask me a few questions about my story, style and what persona we are targeting so you can write something personal and unique to me.')">Help me start</div>
      <div class="chip" onclick="quickstart('Give me 5 very different hook ideas for this product. Make each one a completely different angle, emotion and format so I have real variety to choose from.')">Hook ideas</div>
      <div class="chip" onclick="quickstart('Suggest 5 fresh angles for this product I probably have not tried yet. Think outside the obvious and give me angles that would stop someone mid-scroll.')">Suggest angles</div>
      <div class="chip" onclick="quickstart('What are the best performing script formats for this product and why? Give me a quick breakdown with an example hook for each.')">What formats work?</div>
      <div class="chip" onclick="quickstart('Surprise me. Write something unexpected and creative for this product that I would never have thought of myself. Go bold.')">Surprise me</div>
    </div>
    <div class="input-row">
      <textarea id="userinput" placeholder="Describe what you're scripting..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
      <button id="sendbtn" onclick="send()">Send</button>
    </div>
  </div>
  <div class="footer-row">
    <span class="footer-note">Powered by Claude · Chats are private and not saved</span>
    <button class="clear-btn" onclick="clearHistory()">Clear chat history</button>
  </div>
</div>
<script>
let currentProduct='acne';
let histories={acne:[],gutfibre:[],gutglow:[]};

const PRODUCTS={
acne:`ACTIVE PRODUCT: PuraU Advanced Acne Program
MECHANISM: Damaged gut lining creates gaps. Toxins leak into bloodstream. Immune system triggers inflammation. Skin pushes inflammation out as acne. Fix the gut = fix the skin.
PRODUCT: 3-bottle 90-day system. Step 1 repairs gut lining. Step 2 balances hormones. Step 3 reduces inflammation. Take 1 capsule from each bottle, 3x daily with meals.
CREDENTIALS: Microbiologist-formulated. 100% natural. TGA approved. 50,000+ Australians helped. 94% success rate for severe acne. 5-star Trustpilot. 90-day money-back guarantee.
ACNE TYPES: Hormonal, cystic, adult, puberty, post-pill, chin/jawline, back acne, stress-triggered.
AUDIENCE: Female 80%, 18-35. Frustrated. Tried everything: cleansers, antibiotics, the pill, facials, dermatologists. Thinks Accutane might be the only option left.
OBJECTIONS: Price. Skepticism. Tried everything. Don't want to wait 90 days. Been let down before.
BUYING TRIGGERS: Before/after results. Gut-skin education. 100% natural. 90-day guarantee. Channel 7 news. 50,000 Australians.
ACCUTANE ANGLE: Affects entire body - dry lips, dry skin all over, dry eyes, dehydration, headaches, sun sensitivity. PuraU = no side effects, natural, treats root cause.
7 NEWS ANGLE: Channel 7 segment blew them up overnight. Founder discovered gut-skin connection. 50,000 Australians later.
NEVER SAY: cure.`,
gutfibre:`ACTIVE PRODUCT: PuraU Gut Fibre
HERO INGREDIENT: 100% Sunfiber PHGG. 6.1g fibre per serve. Low-FODMAP Monash certified. Tasteless, grit-free, fully dissolves.
PHGG vs PSYLLIUM: Psyllium causes bloating, not low-FODMAP, thick and gritty. PHGG is prebiotic, feeds good bacteria, improves stool frequency AND consistency, low gas, dissolves clear.
PERSONAS: (A) Bloated girl 18-30 on TikTok into fibremaxxing. (B) Metamucil loyalist 35-65 still bloated. (C) High-protein diet user with sluggish digestion.
PAIN POINTS: Daily bloating, incomplete bowel movements, heavy feeling, gas, relying on laxatives, embarrassment.
NEVER SAY: Ozempic. Colon/bowel cancer. Big TGA claims.`,
gutglow:`ACTIVE PRODUCT: PuraU GutGlow Collagen
WHAT IT IS: 10.5g hydrolysed collagen + 5 digestive enzymes + Vitamin C + Lactospore probiotics. Flavours: Strawberry Watermelon and Passion Mango.
KEY ANGLE: Most collagens have no Vitamin C so you can't absorb it. Most probiotics don't survive stomach acid. GutGlow solves both.
PERSONAS: (A) Women 20-35 with bloating and skin breakouts. (B) Women 25-40 beauty/anti-aging. (C) Women 25-45 chronic bloating.
WHAT WORKS: Direct response problem-solution format. CPA target under $40.`
};

const SYSTEM=`You are a high-performance UGC script assistant for PuraU, an Australian gut and skin health brand.

CORE RULES:
- Ad = Rational + Emotional + Trust
- Make them FEEL the human moment - don't just state the problem
- Always reframe: acne/gut issues are internal root cause, not surface problems
- Trust fast: 50,000+ Australians, 5-star Trustpilot, microbiologist-formulated
- 90-day money-back guarantee always in CTA
- NEVER say "cure"
- Write how people actually talk on camera

SCRIPT ORDER: Hook -> Diagnosis -> Reframe -> Proof -> CTA
LENGTH: TikTok = 60-90 words. Facebook = 90-150 words.

FORMATS: Personal UGC testimonial, Founder/7 News, POV series, Gut-skin lesson, Podcast/Accutane chat, Mum testimonial, Expert edutainment, Dermatologist reacts.

PROVEN HOOKS:
"My gut was causing my face to have cystic acne"
"Your acne has nothing to do with your skin"
"POV: you have hormonal acne"
"94% of customers see a SIGNIFICANT reduction in 90 days"
"So if nothing has worked for you, it's probably not your skin - it's your gut"
"PSA: Acne doesn't start on your skin, it starts in your gut"
"5 years ago we were on the news and this video blew us up overnight"

Always label HOOK: / BODY: / CTA: and give 3 hook variations after every full script.

{PRODUCT}`;

function getSystem(){return SYSTEM.replace('{PRODUCT}',PRODUCTS[currentProduct]);}

function saveToStorage(){
  localStorage.setItem('purau_product',currentProduct);
  localStorage.setItem('purau_histories',JSON.stringify(histories));
}

function loadFromStorage(){
  const savedProduct=localStorage.getItem('purau_product');
  const savedHistories=localStorage.getItem('purau_histories');
  if(savedHistories) histories=JSON.parse(savedHistories);
  if(savedProduct){
    currentProduct=savedProduct;
    document.querySelectorAll('.prod-btn').forEach(b=>b.classList.remove('active'));
    const idx={acne:0,gutfibre:1,gutglow:2}[currentProduct];
    document.querySelectorAll('.prod-btn')[idx].classList.add('active');
  }
  renderMessages();
}

function renderMessages(){
  const msgs=document.getElementById('messages');
  msgs.innerHTML='';
  const h=histories[currentProduct];
  if(h.length===0){
    addMsg('assistant','Hey! I\'m your PuraU script assistant — trained on your products, audiences and winning ad frameworks. To get scripts that are unique to YOU, tap Help me start and I\'ll ask you a few quick questions about your story and style. Or if you know what you want, just type it below.');
  } else {
    h.forEach(m=>addMsg(m.role,m.content));
  }
}

function clearHistory(){
  if(!confirm('Clear chat history for this product?'))return;
  histories[currentProduct]=[];
  saveToStorage();
  renderMessages();
}

function setProduct(p,btn){
  currentProduct=p;
  document.querySelectorAll('.prod-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  saveToStorage();
  renderMessages();
}

function addMsg(role,text,thinking=false){
  const msgs=document.getElementById('messages');
  const d=document.createElement('div');
  d.className='msg '+role;
  if(thinking){d.innerHTML='<div class="typing-dots"><span></span><span></span><span></span></div>';}
  else{d.innerText=text;}
  msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
  return d;
}

function useInspiration(){
  const input=document.getElementById('inspirationInput');
  const text=input.value.trim();
  if(!text)return;
  const prompt='Here is a winning ad concept I love. Please analyse what makes it work — the hook style, emotional trigger, format and structure — then rework it into a completely new, original version for PuraU. Keep the same energy and persuasion mechanics but make it 100% unique and on-brand for PuraU. Here is the inspiration:\n\n'+text;
  input.value='';
  document.getElementById('userinput').value=prompt;
  send();
}

function quickstart(text){document.getElementById('userinput').value=text;send();}

async function send(){
  const input=document.getElementById('userinput');
  const btn=document.getElementById('sendbtn');
  const text=input.value.trim();
  if(!text||btn.disabled)return;
  input.value='';
  btn.disabled=true;
  addMsg('user',text);
  histories[currentProduct].push({role:'user',content:text});
  const thinking=addMsg('assistant','',true);
  try{
    const res=await fetch('/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,system:getSystem(),messages:histories[currentProduct]})
    });
    const data=await res.json();
    const reply=data.content?.[0]?.text||'Something went wrong. Please try again.';
    thinking.remove();
    addMsg('assistant',reply);
    histories[currentProduct].push({role:'assistant',content:reply});
    saveToStorage();
  }catch(e){
    thinking.remove();
    addMsg('assistant','Something went wrong. Please try again.');
  }
  btn.disabled=false;
  document.getElementById('userinput').focus();
}

window.addEventListener('load',loadFromStorage);
</script>
</body>
</html>
